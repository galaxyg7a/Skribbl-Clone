<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INKSHOT — Draw &amp; Guess!</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body class="landing-body skribbl-bg">

  <div id="error-banner" class="error-banner hidden">
    <span id="error-text"></span>
    <button onclick="document.getElementById('error-banner').classList.add('hidden')">✕</button>
  </div>

  <!-- LOGO -->
  <div class="logo-area">
    <span class="logo-text">
      <span class="l1">s</span><span class="l2">k</span><span class="l3">r</span><span class="l4">i</span><span class="l5">b</span><span class="l6">b</span><span class="l7">l</span><span class="l8">.</span><span class="l9">i</span><span class="l10">o</span><img src="/img/pen.gif" class="logo-pen-gif" alt="" />
    </span>
    <!-- Avatar parade (decorative) -->
    <div class="avatar-parade" id="avatar-parade"></div>
  </div>

  <!-- MAIN CARD -->
  <div class="landing-card">

    <!-- Name + Language Row -->
    <div class="top-fields-row">
      <input
        id="username-input"
        type="text"
        class="username-input"
        placeholder="Name..."
        maxlength="20"
        autocomplete="off"
      />
      <select id="lang-select" class="lang-select">
        <option value="en">English</option>
        <option value="de">Deutsch</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
        <option value="pt">Português</option>
        <option value="it">Italiano</option>
        <option value="pl">Polski</option>
        <option value="tr">Türkçe</option>
        <option value="ru">Русский</option>
      </select>
    </div>

    <!-- Avatar Customizer -->
    <div class="avatar-customizer">
      <!-- Left arrows -->
      <div class="arrow-col">
        <button class="arrow-btn" onclick="cycleEye(-1)" title="Previous eyes">&lt;</button>
        <button class="arrow-btn" onclick="cycleMouth(-1)" title="Previous mouth">&lt;</button>
        <button class="arrow-btn" onclick="cycleBody(-1)" title="Previous body">&lt;</button>
      </div>

      <!-- Avatar display (canvas-based organic doodle character) -->
      <div class="avatar-canvas-wrap">
        <canvas id="avatar-canvas" width="80" height="80" style="border:3px solid rgba(255,255,255,0.5);border-radius:8px;display:block;"></canvas>
      </div>

      <!-- Right arrows -->
      <div class="arrow-col">
        <button class="arrow-btn" onclick="cycleEye(1)" title="Next eyes">&gt;</button>
        <button class="arrow-btn" onclick="cycleMouth(1)" title="Next mouth">&gt;</button>
        <button class="arrow-btn" onclick="cycleBody(1)" title="Next body">&gt;</button>
      </div>

      <!-- Dice -->
      <div class="dice-wrap">
        <button class="dice-btn" onclick="randomizeAvatar()" title="Random avatar">🎲</button>
      </div>
    </div>

    <!-- Invite Notice Card (shown only when ?lobby= param is present) -->
    <div id="invite-notice-card" class="invite-notice-card" style="display:none">
      <div class="invite-notice-icon">🔗</div>
      <div class="invite-notice-text">
        <span class="invite-notice-title">Joining Private Lobby</span>
        <span class="invite-notice-code" id="invite-notice-code"></span>
      </div>
    </div>

    <!-- Play! Button -->
    <button class="btn-play" id="btn-play" onclick="playPublic()">Play!</button>

    <!-- Create Private Room -->
    <button class="btn-private" id="btn-private" onclick="createPrivateRoom()">Create Private Room</button>

    <!-- Join with code -->
    <div class="join-section" id="join-section">
      <input
        id="room-code-input"
        type="text"
        class="join-code-input"
        placeholder="Enter room code..."
        maxlength="6"
        autocomplete="off"
        oninput="this.value = this.value.toUpperCase()"
      />
      <button class="btn-join" onclick="joinRoom()">Join →</button>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
  /* ─── Invite Code Detection ───────────────────────────────────── */
  const _urlParams  = new URLSearchParams(window.location.search);
  const _inviteCode = (_urlParams.get('lobby') || '').toUpperCase().trim();
  const _isInviteFlow = /^[A-Z0-9]{4,8}$/.test(_inviteCode);

  /* ─── Avatar System (organic canvas doodle characters) ─────────── */
  let eyeIndex   = 0;
  let mouthIndex = 0;
  let bodyIndex  = 0;

  const BODY_COLORS = [
    '#E74C3C','#E91E63','#FF9800','#F1C40F','#2ECC71',
    '#1ABC9C','#3498DB','#9B59B6','#FF5722','#00BCD4',
    '#8BC34A','#FF4081','#795548','#607D8B','#FF6B6B',
    '#A855F7','#F97316','#06B6D4','#84CC16','#F43F5E',
  ];

  function _wCircle(ctx, cx, cy, r, seed) {
    ctx.beginPath();
    const N = 80;
    for (let i = 0; i <= N; i++) {
      const t = i / N, a = t * Math.PI * 2 - Math.PI / 2;
      const w = 1 + Math.sin(t*7*Math.PI+seed)*0.022 + Math.sin(t*13*Math.PI+seed*0.7)*0.012;
      const x = cx + Math.cos(a)*r*w, y = cy + Math.sin(a)*r*w;
      if (i === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.closePath();
  }

  function _drawEyes(ctx, cx, cy, r, idx, W) {
    ctx.lineJoin='round'; ctx.lineCap='round';
    const lw=Math.max(1.5,W*0.04), ex=r*0.30, ey=cy-r*0.14, er=r*0.13;
    ctx.strokeStyle='#1a1a1a'; ctx.fillStyle='#1a1a1a'; ctx.lineWidth=lw;
    switch(idx%10){
      case 0:
        ctx.beginPath();ctx.arc(cx-ex,ey,er*0.55,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(cx+ex,ey,er*0.55,0,Math.PI*2);ctx.fill();break;
      case 1:
        ctx.beginPath();ctx.arc(cx-ex,ey,er*0.50,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(cx+ex,ey,er*0.50,0,Math.PI*2);ctx.fill();
        ctx.lineWidth=lw*1.3;
        ctx.beginPath();ctx.moveTo(cx-ex-er,ey-er*1.4);ctx.lineTo(cx-ex+er*0.4,ey-er*0.7);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cx+ex+er,ey-er*1.4);ctx.lineTo(cx+ex-er*0.4,ey-er*0.7);ctx.stroke();break;
      case 2:
        ctx.lineWidth=lw*1.2;
        for(const s of[-1,1]){const e2=cx+s*ex;ctx.beginPath();ctx.moveTo(e2-er,ey-er);ctx.lineTo(e2+er,ey+er);ctx.stroke();ctx.beginPath();ctx.moveTo(e2+er,ey-er);ctx.lineTo(e2-er,ey+er);ctx.stroke();}break;
      case 3:{const sgW=ex*2.5,sgH=er;ctx.fillStyle='#111';ctx.beginPath();if(ctx.roundRect)ctx.roundRect(cx-sgW/2,ey-sgH/2,sgW,sgH,er*0.35);else ctx.rect(cx-sgW/2,ey-sgH/2,sgW,sgH);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.22)';ctx.fillRect(cx-sgW*0.45,ey-sgH*0.28,er*0.6,sgH*0.38);ctx.fillRect(cx+er*0.3,ey-sgH*0.28,er*0.6,sgH*0.38);break;}
      case 4:
        for(const s of[-1,1]){const e2=cx+s*ex;ctx.fillStyle='white';ctx.strokeStyle='#333';ctx.lineWidth=lw*0.7;ctx.beginPath();ctx.arc(e2,ey,er,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle='#1a1a1a';ctx.fillRect(e2-er-1,ey-er-1,er*2+2,er*1.1);ctx.beginPath();ctx.arc(e2,ey+er*0.1,er*0.42,0,Math.PI*2);ctx.fill();}
        ctx.strokeStyle='#1a1a1a';ctx.fillStyle='#1a1a1a';break;
      case 5:
        for(const s of[-1,1]){const e2=cx+s*ex;ctx.fillStyle='white';ctx.strokeStyle='#222';ctx.lineWidth=lw*0.8;ctx.beginPath();ctx.ellipse(e2,ey,er*0.8,er*1.05,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle='#111';ctx.beginPath();ctx.arc(e2,ey+er*0.1,er*0.50,0,Math.PI*2);ctx.fill();ctx.fillStyle='white';ctx.beginPath();ctx.arc(e2-er*0.22,ey-er*0.22,er*0.20,0,Math.PI*2);ctx.fill();}
        ctx.strokeStyle='#1a1a1a';ctx.fillStyle='#1a1a1a';break;
      case 6:
        ctx.fillStyle='white';ctx.strokeStyle='#222';ctx.lineWidth=lw;ctx.beginPath();ctx.ellipse(cx,ey,er*1.25,er*1.25,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle='#111';ctx.beginPath();ctx.arc(cx,ey,er*0.65,0,Math.PI*2);ctx.fill();ctx.fillStyle='white';ctx.beginPath();ctx.arc(cx-er*0.28,ey-er*0.28,er*0.24,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#1a1a1a';ctx.fillStyle='#1a1a1a';break;
      case 7:{const crY=ey-r*0.50,crW=r*0.72;ctx.fillStyle='#FFD700';ctx.strokeStyle='#b8860b';ctx.lineWidth=lw*0.6;ctx.beginPath();ctx.moveTo(cx-crW/2,crY+r*0.12);ctx.lineTo(cx-crW/2,crY);ctx.lineTo(cx-crW*0.22,crY+r*0.06);ctx.lineTo(cx,crY-r*0.12);ctx.lineTo(cx+crW*0.22,crY+r*0.06);ctx.lineTo(cx+crW/2,crY);ctx.lineTo(cx+crW/2,crY+r*0.12);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle='rgba(80,160,255,0.55)';ctx.strokeStyle='#555';ctx.lineWidth=lw*0.75;ctx.beginPath();ctx.ellipse(cx-ex,ey,er*0.82,er*0.72,-0.12,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.beginPath();ctx.ellipse(cx+ex,ey,er*0.82,er*0.72,0.12,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.strokeStyle='#555';ctx.lineWidth=lw*0.55;ctx.beginPath();ctx.moveTo(cx-ex+er*0.65,ey);ctx.lineTo(cx+ex-er*0.65,ey);ctx.stroke();ctx.strokeStyle='#1a1a1a';ctx.fillStyle='#1a1a1a';break;}
      case 8:
        for(const s of[-1,1]){const e2=cx+s*ex;ctx.fillStyle='white';ctx.strokeStyle='#333';ctx.lineWidth=lw;ctx.beginPath();ctx.arc(e2,ey,er*0.95,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle='#111';ctx.beginPath();ctx.arc(e2,ey,er*0.48,0,Math.PI*2);ctx.fill();ctx.fillStyle='white';ctx.beginPath();ctx.arc(e2-er*0.18,ey-er*0.18,er*0.18,0,Math.PI*2);ctx.fill();}
        ctx.strokeStyle='#1a1a1a';ctx.fillStyle='#1a1a1a';break;
      case 9:
        for(const s of[-1,1]){const e2=cx+s*ex;ctx.fillStyle='#ff4466';ctx.beginPath();ctx.moveTo(e2,ey+er*0.55);ctx.bezierCurveTo(e2-er*0.95,ey+er*0.1,e2-er*0.95,ey-er*0.5,e2,ey-er*0.15);ctx.bezierCurveTo(e2+er*0.95,ey-er*0.5,e2+er*0.95,ey+er*0.1,e2,ey+er*0.55);ctx.closePath();ctx.fill();}break;
    }
  }

  function _drawMouth(ctx, cx, cy, r, idx, W) {
    ctx.lineJoin='round'; ctx.lineCap='round';
    const lw=Math.max(1.5,W*0.04),my=cy+r*0.30,mw=r*0.50;
    ctx.strokeStyle='#1a1a1a'; ctx.fillStyle='#1a1a1a'; ctx.lineWidth=lw*1.1;
    switch(idx%10){
      case 0:ctx.beginPath();ctx.moveTo(cx-mw,my);ctx.bezierCurveTo(cx-mw*0.35,my+r*0.08,cx+mw*0.35,my-r*0.08,cx+mw,my);ctx.stroke();break;
      case 1:ctx.fillStyle='#c0392b';ctx.beginPath();ctx.arc(cx,my-r*0.05,mw,0,Math.PI);ctx.closePath();ctx.fill();ctx.strokeStyle='#1a1a1a';ctx.lineWidth=lw;ctx.beginPath();ctx.arc(cx,my-r*0.05,mw,0,Math.PI);ctx.stroke();ctx.fillStyle='white';ctx.fillRect(cx-mw*0.82,my-r*0.05,mw*1.64,r*0.12);break;
      case 2:ctx.fillStyle='#1a1a1a';for(const s of[-1,1]){ctx.beginPath();ctx.moveTo(cx,my);ctx.bezierCurveTo(cx+s*mw*0.28,my-r*0.08,cx+s*mw*0.88,my+r*0.16,cx+s*mw*1.08,my-r*0.04);ctx.bezierCurveTo(cx+s*mw*0.78,my-r*0.20,cx+s*mw*0.32,my-r*0.05,cx,my);ctx.fill();}break;
      case 3:ctx.beginPath();ctx.moveTo(cx-mw,my);ctx.bezierCurveTo(cx-mw*0.4,my+r*0.22,cx+mw*0.4,my+r*0.22,cx+mw,my);ctx.stroke();break;
      case 4:ctx.beginPath();ctx.moveTo(cx-mw,my);ctx.lineTo(cx+mw,my);ctx.stroke();ctx.lineWidth=lw*0.6;for(let i=0;i<5;i++){const sx=cx-mw+(i+0.5)*(mw*2/5);ctx.beginPath();ctx.moveTo(sx-r*0.04,my-r*0.08);ctx.lineTo(sx+r*0.04,my+r*0.08);ctx.stroke();}break;
      case 5:ctx.fillStyle='#c0392b';ctx.strokeStyle='#1a1a1a';ctx.lineWidth=lw;ctx.beginPath();ctx.ellipse(cx,my,mw*0.45,mw*0.62,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle='#7a0000';ctx.beginPath();ctx.ellipse(cx,my,mw*0.26,mw*0.38,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#1a1a1a';break;
      case 6:ctx.beginPath();ctx.moveTo(cx-mw*0.28,my+r*0.05);ctx.bezierCurveTo(cx,my+r*0.1,cx+mw*0.5,my-r*0.04,cx+mw*0.78,my-r*0.09);ctx.stroke();break;
      case 7:ctx.lineWidth=lw;ctx.beginPath();ctx.arc(cx,my-r*0.04,mw*0.68,0,Math.PI);ctx.stroke();ctx.fillStyle='#ff6680';ctx.strokeStyle='#cc3355';ctx.lineWidth=lw*0.7;ctx.beginPath();ctx.ellipse(cx,my+mw*0.28,mw*0.28,mw*0.38,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.strokeStyle='#1a1a1a';break;
      case 8:ctx.lineWidth=lw;ctx.beginPath();ctx.moveTo(cx-mw,my);ctx.lineTo(cx+mw,my);ctx.stroke();ctx.fillStyle='#888';ctx.lineWidth=0;for(let i=0;i<=6;i++){const zx=cx-mw+i*(mw*2/6);ctx.beginPath();ctx.arc(zx,my,r*0.048,0,Math.PI*2);ctx.fill();}break;
      case 9:ctx.lineWidth=lw;ctx.beginPath();ctx.moveTo(cx,my-r*0.04);ctx.lineTo(cx,my+r*0.07);ctx.stroke();for(const s of[-1,1]){ctx.beginPath();ctx.moveTo(cx,my+r*0.07);ctx.bezierCurveTo(cx+s*mw*0.18,my+r*0.15,cx+s*mw*0.65,my+r*0.10,cx+s*mw*0.88,my-r*0.02);ctx.stroke();}break;
    }
  }

  function renderSkribblAvatar(canvas, features) {
    const ctx=canvas.getContext('2d');
    const W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);
    ctx.lineJoin='round';ctx.lineCap='round';
    const cx=W*0.5,cy=H*0.48,r=Math.min(W,H)*0.40;
    const bi=(features&&features.bodyIndex!=null)?features.bodyIndex:0;
    const seed=bi*1.618;
    _wCircle(ctx,cx,cy,r,seed);
    ctx.fillStyle=BODY_COLORS[bi%BODY_COLORS.length];ctx.fill();
    ctx.save();_wCircle(ctx,cx,cy,r,seed);ctx.clip();
    ctx.strokeStyle='rgba(0,0,0,0.07)';ctx.lineWidth=Math.max(1,W*0.018);
    const gap=Math.max(4,W*0.1);
    for(let i=-r*2;i<r*4;i+=gap){ctx.beginPath();ctx.moveTo(cx-r*2+i,cy-r*2);ctx.lineTo(cx+i,cy+r*2);ctx.stroke();}
    ctx.restore();
    _wCircle(ctx,cx,cy,r,seed);
    ctx.strokeStyle='rgba(0,0,0,0.55)';ctx.lineWidth=Math.max(2,W*0.045);ctx.stroke();
    _drawEyes(ctx,cx,cy,r,(features&&features.eyeIndex!=null)?features.eyeIndex:0,W);
    _drawMouth(ctx,cx,cy,r,(features&&features.mouthIndex!=null)?features.mouthIndex:0,W);
  }

  function drawAvatar() {
    const c = document.getElementById('avatar-canvas');
    if (!c) return;
    renderSkribblAvatar(c, { bodyIndex, eyeIndex, mouthIndex });
  }

  function cycleEye(dir)   { eyeIndex   = (eyeIndex   + dir + 10) % 10; drawAvatar(); }
  function cycleMouth(dir) { mouthIndex = (mouthIndex + dir + 10) % 10; drawAvatar(); }
  function cycleBody(dir)  { bodyIndex  = (bodyIndex  + dir + BODY_COLORS.length) % BODY_COLORS.length; drawAvatar(); }
  function randomizeAvatar() {
    eyeIndex   = Math.floor(Math.random() * 10);
    mouthIndex = Math.floor(Math.random() * 10);
    bodyIndex  = Math.floor(Math.random() * BODY_COLORS.length);
    drawAvatar();
  }
  function getAvatarColor() { return BODY_COLORS[bodyIndex % BODY_COLORS.length]; }
  function getAvatarData()  { return { bodyIndex, eyeIndex, mouthIndex }; }

  /* ─── Parade (decorative header avatars) ─────────────────────── */
  function buildParade() {
    const parade = document.getElementById('avatar-parade');
    if (!parade) return;
    parade.innerHTML = '';
    for (let bi = 0; bi < Math.min(BODY_COLORS.length, 12); bi++) {
      const c = document.createElement('canvas');
      c.width = 42; c.height = 42;
      c.className = 'parade-avatar';
      renderSkribblAvatar(c, { bodyIndex: bi, eyeIndex: bi % 10, mouthIndex: (bi * 3) % 10 });
      parade.appendChild(c);
    }
  }

  let pendingIdentity = null;

  /* ─── Error ───────────────────────────────────────────────────── */
  function showError(msg) {
    document.getElementById('error-text').textContent = msg;
    document.getElementById('error-banner').classList.remove('hidden');
  }

  function getIdentity() {
    const username = document.getElementById('username-input').value.trim();
    if (!username) { showError('Please enter a name!'); return null; }
    return {
      username,
      avatarColor: getAvatarColor(),
      avatarData: getAvatarData(),
    };
  }

  /* ─── Socket ──────────────────────────────────────────────────── */
  const socket = io();

  socket.on('joined_room', ({ roomCode, playerId }) => {
    sessionStorage.setItem('skribbl_room', roomCode);
    sessionStorage.setItem('skribbl_player_id', playerId);
    const identity = pendingIdentity || {};
    sessionStorage.setItem('skribbl_identity', JSON.stringify(identity));
    window.location.href = '/game?room=' + roomCode;
  });
  socket.on('error', ({ message }) => showError(message));

  function playPublic() {
    const identity = getIdentity();
    if (!identity) return;
    pendingIdentity = identity;
    if (_isInviteFlow) {
      socket.emit('join_room', { ...identity, roomCode: _inviteCode });
    } else {
      socket.emit('create_room', {
        ...identity,
        settings: { maxPlayers: 8, totalRounds: 3, drawTime: 80 },
        isPublic: true,
      });
    }
  }

  function createPrivateRoom() {
    const identity = getIdentity();
    if (!identity) return;
    pendingIdentity = identity;
    socket.emit('create_room', {
      ...identity,
      settings: { maxPlayers: 8, totalRounds: 3, drawTime: 80 },
      isPublic: false,
    });
  }

  function joinRoom() {
    const identity = getIdentity();
    if (!identity) return;
    pendingIdentity = identity;
    const roomCode = document.getElementById('room-code-input').value.trim().toUpperCase();
    if (roomCode.length < 4) { showError('Enter a valid room code.'); return; }
    socket.emit('join_room', { ...identity, roomCode });
  }

  /* ─── Keyboard shortcuts ──────────────────────────────────────── */
  document.getElementById('room-code-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinRoom();
  });
  document.getElementById('username-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') playPublic();
  });

  /* ─── Init ────────────────────────────────────────────────────── */
  randomizeAvatar();
  buildParade();

  if (_isInviteFlow) {
    document.querySelector('.avatar-customizer').style.display = 'none';
    document.getElementById('btn-private').style.display  = 'none';
    document.getElementById('join-section').style.display = 'none';

    const noticeCard = document.getElementById('invite-notice-card');
    const noticeCode = document.getElementById('invite-notice-code');
    noticeCard.style.display = '';
    noticeCode.textContent = _inviteCode;

    const playBtn = document.getElementById('btn-play');
    playBtn.textContent = 'Join Game!';
    playBtn.style.background = 'linear-gradient(135deg, #2979ff 0%, #1a5cd4 100%)';
  }
  </script>
</body>
</html>
