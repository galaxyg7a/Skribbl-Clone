<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INKSHOT — Playing</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body class="game-body skribbl-bg">

  <!-- ══════════════════════════════════════════
       HEADER
  ══════════════════════════════════════════ -->
  <header class="game-header">
    <!-- Left: Timer + Round -->
    <div class="header-left">
      <div class="timer-wrapper">
        <svg class="timer-ring" viewBox="0 0 52 52">
          <circle class="timer-ring-bg"   cx="26" cy="26" r="23"/>
          <circle id="timer-ring-fill" class="timer-ring-fill" cx="26" cy="26" r="23"/>
        </svg>
        <span id="timer-text" class="timer-text">–</span>
      </div>
      <div class="round-info">
        <span class="round-label">Round</span>
        <span class="round-counter">
          <span id="round-display">–</span> of <span id="round-total">–</span>
        </span>
      </div>
    </div>

    <!-- Center: Status + Word -->
    <div class="header-center">
      <span class="header-status-label" id="header-status">WAITING</span>
      <div class="word-display-wrap">
        <span id="word-display">Waiting...</span>
      </div>
    </div>

    <!-- Right: Room code + Gear -->
    <div class="header-right">
      <span id="room-code-badge">ROOM: ——</span>
      <button class="gear-btn" onclick="UI.openSettingsModal()" title="Settings"><img src="/img/settings.gif" alt="Settings" style="width:22px;height:22px;display:block;filter:brightness(0) invert(1);" /></button>
    </div>
  </header>

  <!-- ══════════════════════════════════════════
       LOBBY SCREEN — 3-column skribbl-style layout
  ══════════════════════════════════════════ -->
  <div id="lobby-screen" class="lobby-full-screen hidden">

  <!-- TOP ROW: three columns -->
  <div class="lfs-top-row">

    <!-- LEFT: Players -->
    <div class="lfs-col lfs-players">
      <div class="lfs-col-title">Players</div>
      <div id="lobby-player-list" class="player-list"></div>
    </div>

    <!-- CENTER: Settings + Controls -->
    <div class="lfs-col lfs-center">

      <!-- Header ribbon -->
      <div class="lobby-header-ribbon">
        <span>Round 1 of <span id="lobby-round-total">3</span></span>
        <span class="lobby-status-text">WAITING</span>
      </div>

      <!-- Settings grid -->
      <div class="lobby-dark-panel">
        <div class="lobby-settings-matrix">
          <div class="settings-control-group">
            <label>Players</label>
            <select class="lob-select" id="lset-players" onchange="emitSettingChange()">
              <option value="2">2</option><option value="4">4</option>
              <option value="6">6</option><option value="8" selected>8</option>
              <option value="10">10</option><option value="12">12</option>
              <option value="16">16</option><option value="20">20</option>
            </select>
          </div>
          <div class="settings-control-group">
            <label>Language</label>
            <select class="lob-select" id="lset-language">
              <option value="en" selected>English</option>
              <option value="de">Deutsch</option>
              <option value="fr">Français</option>
              <option value="es">Español</option>
            </select>
          </div>
          <div class="settings-control-group">
            <label>Drawtime</label>
            <select class="lob-select" id="lset-drawtime" onchange="emitSettingChange()">
              <option value="30">30</option><option value="45">45</option>
              <option value="60">60</option><option value="80" selected>80</option>
              <option value="100">100</option><option value="120">120</option>
              <option value="150">150</option><option value="180">180</option>
            </select>
          </div>
          <div class="settings-control-group">
            <label>Rounds</label>
            <select class="lob-select" id="lset-rounds" onchange="emitSettingChange()">
              <option value="2">2</option><option value="3" selected>3</option>
              <option value="4">4</option><option value="5">5</option>
              <option value="6">6</option><option value="8">8</option>
              <option value="10">10</option>
            </select>
          </div>
          <div class="settings-control-group">
            <label>Game Mode</label>
            <select class="lob-select" id="lset-gamemode">
              <option value="normal" selected>Normal</option>
              <option value="hidden">Hidden</option>
            </select>
          </div>
          <div class="settings-control-group">
            <label>Word Count</label>
            <select class="lob-select" id="lset-wordcount">
              <option value="1">1</option><option value="2">2</option>
              <option value="3" selected>3</option><option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>
          <div class="settings-control-group full-width-row">
            <label>Hints</label>
            <select class="lob-select" id="lset-hints">
              <option value="0">0</option><option value="1">1</option>
              <option value="2" selected>2</option><option value="3">3</option>
              <option value="4">4</option>
            </select>
          </div>
        </div>

        <!-- Custom words -->
        <div class="lobby-custom-words-container">
          <div class="cw-header">
            <span class="cw-title">Custom words</span>
            <label class="cw-toggle">
              <input type="checkbox" id="custom-words-only" />
              Use custom words only
            </label>
          </div>
          <textarea id="custom-words-input" class="cw-lobby-textarea"
            placeholder="Minimum of 10 words. 1-32 characters per word! 20000 characters maximum. Separated by a , (comma)"></textarea>
        </div>
      </div>

      <!-- Start / Invite / Owner badge bar -->
      <div class="lobby-action-control-footer">
        <button id="start-btn" class="skribbl-green-start-btn hidden" onclick="startGame()">Start!</button>
        <button type="button" id="invite-copy-btn" class="lobby-invite-btn" onclick="copyInviteLink()"><img src="/img/link.svg" style="width:14px;height:14px;vertical-align:middle;margin-right:4px;" alt=""/>Invite</button>
        <span id="lobby-host-badge" class="skribbl-blue-owner-badge hidden"></span>
      </div>
      <input type="text" id="invite-link-input" style="display:none" readonly value="" />

      <!-- Hidden compat elements -->
      <span id="lobby-player-count"     style="display:none"></span>
      <span id="lobby-settings-display" style="display:none"></span>
      <span id="lobby-room-code"        style="display:none"></span>
      <span id="lobby-title"            style="display:none"></span>
      <span id="lobby-subtitle"         style="display:none"></span>
    </div>

    <!-- RIGHT: Chat (log only — input is in bottom bar) -->
    <div class="lfs-col lfs-chat">
      <div class="lfs-col-title">Chat</div>
      <div id="lobby-chat-log" class="chat-log"></div>
    </div>

  </div><!-- /.lfs-top-row -->

  <!-- BOTTOM BAR: full-width typing input (matches skribbl.io) -->
  <div class="lfs-bottom-bar">
    <input
      id="lobby-chat-input"
      type="text"
      placeholder="Type your guess here..."
      maxlength="120"
      autocomplete="off"
      onkeydown="if(event.key==='Enter') sendChatFromLobby()"
    />
    <button class="lfs-bottom-send" onclick="sendChatFromLobby()">➤</button>
  </div>

  </div><!-- /#lobby-screen -->

  <!-- ══════════════════════════════════════════
       THREE-COLUMN LAYOUT (game mode)
  ══════════════════════════════════════════ -->
  <div class="game-layout">

    <!-- ── LEFT: SCOREBOARD ── -->
    <aside class="scoreboard skribbl-bg">
      <div id="player-list" class="player-list"></div>
    </aside>

    <!-- ── CENTER: CANVAS + TOOL BELT ── -->
    <main class="game-center">
      <div class="canvas-wrap">
        <canvas id="draw-canvas" width="800" height="600"></canvas>

        <!-- WORD SELECTION OVERLAY -->
        <div id="overlay-word-selection" class="canvas-overlay word-selection-overlay hidden">
          <div class="word-selection-inner">
            <div id="word-choice-panel" class="word-choice-panel hidden">
              <h2 class="overlay-title">Choose a word to draw!</h2>
              <div id="word-choices" class="word-choices"></div>
            </div>
            <div id="word-waiting-panel" class="word-waiting-panel hidden">
              <div class="choosing-spinner"></div>
              <h2 class="overlay-title">
                <span id="drawer-name-choosing"></span> is choosing a word...
              </h2>
            </div>
          </div>
        </div>

        <!-- TURN OVER OVERLAY -->
        <div id="overlay-turn-over" class="canvas-overlay result-overlay hidden">
          <div class="result-inner">
            <div class="result-icon">🏁</div>
            <h2 class="overlay-title">Turn Over!</h2>
            <p class="result-word">The word was: <strong id="revealed-word"></strong></p>
            <div id="turn-scores-list" class="score-list"></div>
          </div>
        </div>

        <!-- ROUND OVER OVERLAY -->
        <div id="overlay-round-over" class="canvas-overlay result-overlay hidden">
          <div class="result-inner">
            <div class="result-icon">🔔</div>
            <h2 class="overlay-title">Round <span id="round-over-num"></span> Complete!</h2>
            <div id="round-scores-list" class="score-list"></div>
          </div>
        </div>

        <!-- GAME OVER OVERLAY -->
        <div id="overlay-game-over" class="canvas-overlay result-overlay hidden">
          <div class="result-inner">
            <h2 class="overlay-title" style="font-size:1.8rem">🏆 Game Over!</h2>
            <div id="podium" class="podium"></div>
            <div id="final-scores" class="final-scores"></div>
            <button class="btn-play-again" onclick="leaveGame()">Back to Lobby</button>
          </div>
        </div>
      </div>

      <!-- TOOL BELT -->
      <div id="tool-belt" class="tool-belt hidden">
        <div class="tool-section">
          <button id="tool-pencil" class="tool-btn active" title="Pencil (B)"   onclick="setTool('pencil')"><img src="/img/pen.gif"          class="tool-icon" alt="Pencil"/></button>
          <button id="tool-eraser" class="tool-btn"        title="Eraser"        onclick="setTool('eraser')"><img src="/img/size.gif"         class="tool-icon" alt="Eraser"/></button>
          <button id="tool-fill"   class="tool-btn"        title="Fill (F)"      onclick="setTool('fill')">  <img src="/img/bulb.gif"         class="tool-icon" alt="Fill"/></button>
          <button class="tool-btn"                          title="Undo (U)"      onclick="doUndo()">         <img src="/img/arrow.gif"        class="tool-icon" alt="Undo"/></button>
          <button class="tool-btn"                          title="Clear (C)"     onclick="doClear()">        <img src="/img/randomize.gif"    class="tool-icon" alt="Clear"/></button>
        </div>
        <div class="tool-section palette-section">
          <div id="color-palette" class="color-palette"></div>
          <input type="color" id="custom-color" class="custom-color-input" title="Custom color" />
        </div>
        <div class="tool-section size-section">
          <span class="size-label">Size</span>
          <input type="range" id="brush-size" class="brush-slider" min="2" max="40" value="6" />
          <div id="brush-preview" class="brush-preview"></div>
        </div>
      </div>
    </main>

    <!-- ── RIGHT: CHAT ── -->
    <aside class="chat-panel">
      <div id="chat-log" class="chat-log"></div>
      <div class="chat-input-wrap">
        <input
          id="chat-input"
          type="text"
          placeholder="Type your guess here..."
          maxlength="120"
          autocomplete="off"
          onkeydown="if(event.key==='Enter') sendChat()"
        />
        <button class="chat-send-btn" onclick="sendChat()">➤</button>
      </div>
    </aside>
  </div>

  <!-- ══════════════════════════════════════════
       SETTINGS MODAL
  ══════════════════════════════════════════ -->
  <div id="modal-settings" class="modal-backdrop hidden">
    <div class="modal-box settings-modal-box">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" onclick="UI.closeSettingsModal()">✕</button>
      </div>
      <div class="settings-modal-body">
        <!-- Volume -->
        <div>
          <div class="setting-section-title">
            <span>🔊 Volume <span id="volume-label">100%</span></span>
          </div>
          <div class="volume-row">
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="100"
              oninput="document.getElementById('volume-label').textContent=this.value+'%'" />
          </div>
        </div>

        <!-- Hotkeys -->
        <div>
          <div class="setting-section-title">
            <span>⌨️ Hotkeys</span>
            <button class="reset-btn" onclick="UI.resetHotkeys()">Reset</button>
          </div>
          <div class="hotkeys-grid">
            <div class="hotkey-item">
              <span class="hotkey-label">Brush</span>
              <input class="hotkey-input" id="hk-brush" value="B" maxlength="1" />
            </div>
            <div class="hotkey-item">
              <span class="hotkey-label">Fill</span>
              <input class="hotkey-input" id="hk-fill" value="F" maxlength="1" />
            </div>
            <div class="hotkey-item">
              <span class="hotkey-label">Undo</span>
              <input class="hotkey-input" id="hk-undo" value="U" maxlength="1" />
            </div>
            <div class="hotkey-item">
              <span class="hotkey-label">Clear</span>
              <input class="hotkey-input" id="hk-clear" value="C" maxlength="1" />
            </div>
            <div class="hotkey-item">
              <span class="hotkey-label">Swap</span>
              <input class="hotkey-input" id="hk-swap" value="S" maxlength="1" />
            </div>
          </div>
        </div>

        <!-- Miscellaneous -->
        <div>
          <div class="setting-section-title">
            <span>❓ Miscellaneous</span>
          </div>
          <div class="misc-list">
            <div class="misc-row">
              <label class="misc-label">Mobile Keyboard (Experimental)</label>
              <select class="misc-select">
                <option selected>Disabled</option>
                <option>Enabled</option>
              </select>
            </div>
            <div class="misc-row">
              <label class="misc-label">Mobile Keyboard Language Layout</label>
              <select class="misc-select">
                <option selected>English</option>
                <option>Deutsch</option>
                <option>Français</option>
              </select>
            </div>
            <div class="misc-row">
              <label class="misc-label">Mobile Chat Input Layout</label>
              <select class="misc-select">
                <option selected>Bottom</option>
                <option>Top</option>
              </select>
            </div>
            <div class="misc-row">
              <label class="misc-label">Brush Pressure Sensitivity</label>
              <select class="misc-select">
                <option selected>On</option>
                <option>Off</option>
              </select>
            </div>
            <div class="misc-row">
              <label class="misc-label">Mobile Chat Bubbles (chat messages on drawing board)</label>
              <select class="misc-select">
                <option selected>Enabled</option>
                <option>Disabled</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       PLAYER INTERACTION MODAL
  ══════════════════════════════════════════ -->
  <div id="modal-player" class="modal-backdrop hidden">
    <div class="modal-box player-modal-box">
      <div class="modal-header">
        <h2 id="modal-player-name">Player</h2>
        <button class="modal-close" onclick="UI.closePlayerModal()">✕</button>
      </div>
      <div class="player-modal-body">
        <div class="player-modal-avatar">
          <canvas id="modal-avatar-canvas" width="90" height="90"></canvas>
        </div>
        <div class="player-modal-actions">
          <button class="modal-action-btn" onclick="UI.votekickPlayer()">Votekick</button>
          <button class="modal-action-btn" onclick="UI.mutePlayer()">Mute</button>
          <button class="modal-action-btn" onclick="UI.reportPlayer()">Report</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/sound.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/canvas.js"></script>
  <script src="/js/socket.js"></script>

  <script>
  /* ─── Lobby chat send ────────────────────────────────────────── */
  function sendChatFromLobby() {
    const input = document.getElementById('lobby-chat-input');
    if (!input) return;
    const msg = input.value.trim();
    if (!msg || typeof socket === 'undefined') return;
    socket.emit('chat_message', { message: msg });
    input.value = '';
  }

  /* ─── Invite link copy ────────────────────────────────────────── */
  function copyInviteLink() {
    const input = document.getElementById('invite-link-input');
    const btn   = document.getElementById('invite-copy-btn');
    if (!input || !input.value) return;
    navigator.clipboard.writeText(input.value).then(() => {
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '🔗 Invite';
        btn.classList.remove('copied');
      }, 1500);
    }).catch(() => {
      input.select();
      document.execCommand('copy');
      btn.textContent = '✓ Copied!';
      setTimeout(() => { btn.textContent = '🔗 Invite'; }, 1500);
    });
  }

  /* ─── Lobby settings emit ─────────────────────────────────────── */
  function emitSettingChange() {
    if (typeof socket === 'undefined') return;
    socket.emit('update_settings', {
      maxPlayers: parseInt(document.getElementById('lset-players').value),
      drawTime:   parseInt(document.getElementById('lset-drawtime').value),
      totalRounds: parseInt(document.getElementById('lset-rounds').value),
    });
  }

  /* ─── Keyboard shortcuts for tools ───────────────────────────── */
  document.addEventListener('keydown', e => {
    if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
    const hkBrush = document.getElementById('hk-brush')?.value?.toUpperCase() || 'B';
    const hkFill  = document.getElementById('hk-fill')?.value?.toUpperCase()  || 'F';
    const hkUndo  = document.getElementById('hk-undo')?.value?.toUpperCase()  || 'U';
    const hkClear = document.getElementById('hk-clear')?.value?.toUpperCase() || 'C';
    const k = e.key.toUpperCase();
    if (k === hkBrush) setTool('pencil');
    else if (k === hkFill)  setTool('fill');
    else if (k === hkUndo)  doUndo();
    else if (k === hkClear) doClear();
  });
  </script>
</body>
</html>
