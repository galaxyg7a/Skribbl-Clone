services:
  - type: web
    name: skribbl-game
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install -g pnpm@10 && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
