<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INKSHOT — Draw &amp; Guess!</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body class="landing-body skribbl-bg">

  <div id="error-banner" class="error-banner hidden">
    <span id="error-text"></span>
    <button onclick="document.getElementById('error-banner').classList.add('hidden')">✕</button>
  </div>

  <!-- LOGO -->
  <div class="logo-area">
    <span class="logo-text">
      <span class="l1">s</span><span class="l2">k</span><span class="l3">r</span><span class="l4">i</span><span class="l5">b</span><span class="l6">b</span><span class="l7">l</span><span class="l8">.</span><span class="l9">i</span><span class="l10">o</span><span class="pencil">✏</span>
    </span>
    <!-- Avatar parade (decorative) -->
    <div class="avatar-parade" id="avatar-parade"></div>
  </div>

  <!-- MAIN CARD -->
  <div class="landing-card">

    <!-- Name + Language Row -->
    <div class="top-fields-row">
      <input
        id="username-input"
        type="text"
        class="username-input"
        placeholder="Name..."
        maxlength="20"
        autocomplete="off"
      />
      <select id="lang-select" class="lang-select">
        <option value="en">English</option>
        <option value="de">Deutsch</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
        <option value="pt">Português</option>
        <option value="it">Italiano</option>
        <option value="pl">Polski</option>
        <option value="tr">Türkçe</option>
        <option value="ru">Русский</option>
      </select>
    </div>

    <!-- Avatar Customizer -->
    <div class="avatar-customizer">
      <!-- Left arrows -->
      <div class="arrow-col">
        <button class="arrow-btn" onclick="cycleEye(-1)" title="Previous eyes">&lt;</button>
        <button class="arrow-btn" onclick="cycleMouth(-1)" title="Previous mouth">&lt;</button>
        <button class="arrow-btn" onclick="cycleBody(-1)" title="Previous body">&lt;</button>
      </div>

      <!-- Avatar display (SVG-based — pre-rendered default, JS updates on interaction) -->
      <div class="avatar-canvas-wrap">
        <div id="avatar-display" style="width:80px;height:80px;border:3px solid rgba(255,255,255,0.5);border-radius:8px;overflow:hidden;display:block;">
          <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
            <rect width="80" height="80" fill="#E76F51"/>
            <rect x="11" y="6" width="58" height="45" fill="#F4A261"/>
            <rect x="18" y="28" width="12" height="9" fill="white"/>
            <rect x="50" y="28" width="12" height="9" fill="white"/>
            <rect x="21" y="30" width="6" height="6" fill="#111"/>
            <rect x="53" y="30" width="6" height="6" fill="#111"/>
            <rect x="23" y="31" width="2" height="2" fill="white"/>
            <rect x="55" y="31" width="2" height="2" fill="white"/>
            <rect x="22" y="52" width="36" height="10" fill="#c0392b"/>
            <rect x="25" y="53" width="6" height="7" fill="white"/>
            <rect x="33" y="53" width="6" height="7" fill="white"/>
            <rect x="41" y="53" width="6" height="7" fill="white"/>
            <rect x="22" y="59" width="36" height="3" fill="#c0392b"/>
          </svg>
        </div>
      </div>

      <!-- Right arrows -->
      <div class="arrow-col">
        <button class="arrow-btn" onclick="cycleEye(1)" title="Next eyes">&gt;</button>
        <button class="arrow-btn" onclick="cycleMouth(1)" title="Next mouth">&gt;</button>
        <button class="arrow-btn" onclick="cycleBody(1)" title="Next body">&gt;</button>
      </div>

      <!-- Dice -->
      <div class="dice-wrap">
        <button class="dice-btn" onclick="randomizeAvatar()" title="Random avatar">🎲</button>
      </div>
    </div>

    <!-- Invite Notice Card (shown only when ?lobby= param is present) -->
    <div id="invite-notice-card" class="invite-notice-card" style="display:none">
      <div class="invite-notice-icon">🔗</div>
      <div class="invite-notice-text">
        <span class="invite-notice-title">Joining Private Lobby</span>
        <span class="invite-notice-code" id="invite-notice-code"></span>
      </div>
    </div>

    <!-- Play! Button -->
    <button class="btn-play" id="btn-play" onclick="playPublic()">Play!</button>

    <!-- Create Private Room -->
    <button class="btn-private" id="btn-private" onclick="createPrivateRoom()">Create Private Room</button>

    <!-- Join with code -->
    <div class="join-section" id="join-section">
      <input
        id="room-code-input"
        type="text"
        class="join-code-input"
        placeholder="Enter room code..."
        maxlength="6"
        autocomplete="off"
        oninput="this.value = this.value.toUpperCase()"
      />
      <button class="btn-join" onclick="joinRoom()">Join →</button>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
  /* ─── Invite Code Detection ───────────────────────────────────── */
  const _urlParams  = new URLSearchParams(window.location.search);
  const _inviteCode = (_urlParams.get('lobby') || '').toUpperCase().trim();
  const _isInviteFlow = /^[A-Z0-9]{4,8}$/.test(_inviteCode);

  /* ─── Avatar System ───────────────────────────────────────────── */
  let eyeIndex   = 0;
  let mouthIndex = 0;
  let bodyIndex  = 0;

  const BODY_SCHEMES = [
    { face: '#F4A261', body: '#E76F51', stripe: '#c45a30' },
    { face: '#FFDDB3', body: '#d4a574', stripe: '#a0725a' },
    { face: '#8D5524', body: '#6B3A1A', stripe: '#4a2210' },
    { face: '#3498DB', body: '#2060a0', stripe: '#1a4578' },
    { face: '#9B59B6', body: '#7D3C98', stripe: '#5c2a72' },
    { face: '#2ECC71', body: '#1a9950', stripe: '#126e38' },
    { face: '#E74C3C', body: '#c0392b', stripe: '#8e2218' },
    { face: '#F39C12', body: '#d48010', stripe: '#a05e08' },
    { face: '#1ABC9C', body: '#16a085', stripe: '#0d7560' },
  ];

  const EYE_FNS = [
    // Normal eyes
    function(ctx, W, H) {
      const ey = H * 0.36;
      ctx.fillStyle = 'white';
      ctx.fillRect(W*0.22, ey, 14, 11);
      ctx.fillRect(W*0.55, ey, 14, 11);
      ctx.fillStyle = '#111';
      ctx.fillRect(W*0.26, ey+2, 7, 7);
      ctx.fillRect(W*0.59, ey+2, 7, 7);
      ctx.fillStyle = 'white';
      ctx.fillRect(W*0.28, ey+3, 2, 2);
      ctx.fillRect(W*0.61, ey+3, 2, 2);
    },
    // Sunglasses
    function(ctx, W, H) {
      const ey = H * 0.36;
      ctx.fillStyle = '#111';
      ctx.fillRect(W*0.20, ey-1, 17, 13);
      ctx.fillRect(W*0.54, ey-1, 17, 13);
      ctx.fillStyle = '#333';
      ctx.fillRect(W*0.37, ey+2, W*0.17, 5);
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillRect(W*0.22, ey+1, 6, 4);
      ctx.fillRect(W*0.56, ey+1, 6, 4);
    },
    // Worried eyes
    function(ctx, W, H) {
      const ey = H * 0.36;
      ctx.fillStyle = 'white';
      ctx.fillRect(W*0.22, ey, 14, 10);
      ctx.fillRect(W*0.55, ey, 14, 10);
      ctx.fillStyle = '#111';
      ctx.fillRect(W*0.26, ey+2, 6, 6);
      ctx.fillRect(W*0.59, ey+2, 6, 6);
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(W*0.21, ey-6); ctx.lineTo(W*0.36, ey-2);
      ctx.moveTo(W*0.54, ey-2); ctx.lineTo(W*0.70, ey-6);
      ctx.stroke();
    },
    // Star eyes
    function(ctx, W, H) {
      const ey = H * 0.34;
      ctx.fillStyle = 'white';
      ctx.fillRect(W*0.20, ey, 16, 14);
      ctx.fillRect(W*0.54, ey, 16, 14);
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('★', W*0.29, ey+11);
      ctx.fillText('★', W*0.63, ey+11);
    },
  ];

  const MOUTH_FNS = [
    // Big smile
    function(ctx, W, H) {
      const my = H * 0.61;
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(W*0.25, my, 30, 12);
      ctx.fillStyle = 'white';
      for (let i = 0; i < 4; i++) {
        ctx.fillRect(W*0.26 + i*7, my+1, 5, 7);
      }
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(W*0.25, my+8, 30, 4);
    },
    // Frown
    function(ctx, W, H) {
      const my = H * 0.65;
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(W*0.28, my, 24, 9);
      ctx.fillStyle = 'white';
      ctx.fillRect(W*0.30, my+1, 20, 4);
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(W*0.25, my-5, 30, 6);
    },
    // Grin
    function(ctx, W, H) {
      const my = H * 0.60;
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(W*0.22, my, 36, 14);
      ctx.fillStyle = 'white';
      for (let i = 0; i < 5; i++) {
        ctx.fillRect(W*0.23 + i*6.5, my+1, 5, 8);
      }
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(W*0.22, my+9, 36, 5);
    },
    // O mouth
    function(ctx, W, H) {
      const my = H * 0.62;
      ctx.fillStyle = '#c0392b';
      ctx.beginPath();
      ctx.ellipse(W*0.5, my, 10, 12, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#800';
      ctx.beginPath();
      ctx.ellipse(W*0.5, my+1, 6, 8, 0, 0, Math.PI*2);
      ctx.fill();
    },
  ];

  /* Eye SVG snippets [4 styles] */
  const EYE_SVG = [
    // Normal
    s => `<rect x="18" y="28" width="12" height="9" fill="white"/>
          <rect x="50" y="28" width="12" height="9" fill="white"/>
          <rect x="21" y="30" width="6" height="6" fill="#111"/>
          <rect x="53" y="30" width="6" height="6" fill="#111"/>
          <rect x="23" y="31" width="2" height="2" fill="white"/>
          <rect x="55" y="31" width="2" height="2" fill="white"/>`,
    // Sunglasses
    s => `<rect x="16" y="27" width="16" height="10" fill="#111"/>
          <rect x="48" y="27" width="16" height="10" fill="#111"/>
          <rect x="32" y="29" width="16" height="4" fill="#111"/>
          <rect x="17" y="28" width="6" height="3" fill="rgba(255,255,255,0.2)"/>
          <rect x="49" y="28" width="6" height="3" fill="rgba(255,255,255,0.2)"/>`,
    // Worried
    s => `<rect x="18" y="29" width="12" height="8" fill="white"/>
          <rect x="50" y="29" width="12" height="8" fill="white"/>
          <rect x="21" y="31" width="6" height="5" fill="#111"/>
          <rect x="53" y="31" width="6" height="5" fill="#111"/>
          <line x1="17" y1="23" x2="30" y2="27" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="50" y1="27" x2="63" y2="23" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>`,
    // Happy squint
    s => `<rect x="18" y="28" width="12" height="5" fill="white"/>
          <rect x="50" y="28" width="12" height="5" fill="white"/>
          <rect x="18" y="24" width="12" height="5" fill="${s.face}"/>
          <rect x="50" y="24" width="12" height="5" fill="${s.face}"/>`,
  ];

  /* Mouth SVG snippets [4 styles] */
  const MOUTH_SVG = [
    // Big smile
    s => `<rect x="22" y="52" width="36" height="10" fill="#c0392b"/>
          <rect x="25" y="53" width="6" height="7" fill="white"/>
          <rect x="33" y="53" width="6" height="7" fill="white"/>
          <rect x="41" y="53" width="6" height="7" fill="white"/>
          <rect x="22" y="59" width="36" height="3" fill="#c0392b"/>`,
    // Frown
    s => `<rect x="26" y="56" width="28" height="8" fill="#c0392b"/>
          <rect x="29" y="57" width="22" height="4" fill="white"/>
          <rect x="22" y="50" width="36" height="7" fill="${s.face}"/>`,
    // Grin (big)
    s => `<rect x="18" y="50" width="44" height="12" fill="#c0392b"/>
          <rect x="20" y="51" width="6" height="8" fill="white"/>
          <rect x="28" y="51" width="6" height="8" fill="white"/>
          <rect x="36" y="51" width="6" height="8" fill="white"/>
          <rect x="44" y="51" width="6" height="8" fill="white"/>
          <rect x="18" y="58" width="44" height="4" fill="#c0392b"/>`,
    // O mouth
    s => `<ellipse cx="40" cy="55" rx="8" ry="10" fill="#c0392b"/>
          <ellipse cx="40" cy="56" rx="5" ry="7" fill="#800000"/>`,
  ];

  function makeAvatarSVG(s, ei, mi, W, H) {
    return `<svg width="${W}" height="${H}" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <rect width="80" height="80" fill="${s.body}"/>
      <rect x="11" y="6" width="58" height="45" fill="${s.face}"/>
      <rect x="11" y="6" width="58" height="45" fill="rgba(0,0,0,0.06)"/>
      <rect x="11" y="6" width="58" height="45" fill="${s.face}"/>
      ${s.stripe ? `<rect x="24" y="53" width="32" height="8" fill="${s.stripe}"/>` : ''}
      ${EYE_SVG[ei % EYE_SVG.length](s)}
      ${MOUTH_SVG[mi % MOUTH_SVG.length](s)}
      <rect x="11" y="6" width="58" height="45" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
    </svg>`;
  }

  function drawAvatar() {
    const el = document.getElementById('avatar-display');
    if (!el) return;
    const s = BODY_SCHEMES[bodyIndex % BODY_SCHEMES.length];
    el.innerHTML = makeAvatarSVG(s, eyeIndex, mouthIndex, 80, 80);
  }

  function cycleEye(dir) {
    eyeIndex = (eyeIndex + dir + EYE_FNS.length) % EYE_FNS.length;
    drawAvatar();
  }
  function cycleMouth(dir) {
    mouthIndex = (mouthIndex + dir + MOUTH_FNS.length) % MOUTH_FNS.length;
    drawAvatar();
  }
  function cycleBody(dir) {
    bodyIndex = (bodyIndex + dir + BODY_SCHEMES.length) % BODY_SCHEMES.length;
    drawAvatar();
  }
  function randomizeAvatar() {
    eyeIndex   = Math.floor(Math.random() * EYE_FNS.length);
    mouthIndex = Math.floor(Math.random() * MOUTH_FNS.length);
    bodyIndex  = Math.floor(Math.random() * BODY_SCHEMES.length);
    drawAvatar();
  }

  function getAvatarColor() {
    return BODY_SCHEMES[bodyIndex % BODY_SCHEMES.length].face;
  }
  function getAvatarData() {
    return { eyeIndex, mouthIndex, bodyIndex };
  }

  /* ─── Parade (decorative header avatars) ─────────────────────── */
  function buildParade() {
    const parade = document.getElementById('avatar-parade');
    const colors = BODY_SCHEMES.map(s => s.face);
    colors.forEach((color, ci) => {
      const c = document.createElement('canvas');
      c.width = 42; c.height = 42;
      c.className = 'parade-avatar';
      const ctx = c.getContext('2d');
      const s = BODY_SCHEMES[ci];
      // Body
      ctx.fillStyle = s.body;
      ctx.fillRect(0, 26, 42, 16);
      // Face
      ctx.fillStyle = s.face;
      ctx.fillRect(6, 4, 30, 24);
      // Eyes
      ctx.fillStyle = 'white';
      ctx.fillRect(9, 10, 6, 5);
      ctx.fillRect(27, 10, 6, 5);
      ctx.fillStyle = '#111';
      ctx.fillRect(10, 11, 3, 3);
      ctx.fillRect(28, 11, 3, 3);
      // Smile
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(12, 21, 18, 5);
      ctx.fillStyle = 'white';
      ctx.fillRect(14, 22, 14, 2);
      parade.appendChild(c);
    });
  }

  /* ─── Error ───────────────────────────────────────────────────── */
  function showError(msg) {
    document.getElementById('error-text').textContent = msg;
    document.getElementById('error-banner').classList.remove('hidden');
  }

  function getIdentity() {
    const username = document.getElementById('username-input').value.trim();
    if (!username) { showError('Please enter a name!'); return null; }
    return {
      username,
      avatarColor: getAvatarColor(),
      avatarData: getAvatarData(),
    };
  }

  /* ─── Socket ──────────────────────────────────────────────────── */
  const socket = io();

  socket.on('joined_room', ({ roomCode }) => {
    sessionStorage.setItem('skribbl_room', roomCode);
    window.location.href = '/game';
  });
  socket.on('error', ({ message }) => showError(message));

  function playPublic() {
    const identity = getIdentity();
    if (!identity) return;
    if (_isInviteFlow) {
      socket.emit('join_room', { ...identity, roomCode: _inviteCode });
    } else {
      socket.emit('create_room', {
        ...identity,
        settings: { maxPlayers: 8, totalRounds: 3, drawTime: 80 },
        isPublic: true,
      });
    }
  }

  function createPrivateRoom() {
    const identity = getIdentity();
    if (!identity) return;
    socket.emit('create_room', {
      ...identity,
      settings: { maxPlayers: 8, totalRounds: 3, drawTime: 80 },
      isPublic: false,
    });
  }

  function joinRoom() {
    const identity = getIdentity();
    if (!identity) return;
    const roomCode = document.getElementById('room-code-input').value.trim().toUpperCase();
    if (roomCode.length < 4) { showError('Enter a valid room code.'); return; }
    socket.emit('join_room', { ...identity, roomCode });
  }

  /* ─── Keyboard shortcuts ──────────────────────────────────────── */
  document.getElementById('room-code-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinRoom();
  });
  document.getElementById('username-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') playPublic();
  });

  /* ─── Init ────────────────────────────────────────────────────── */
  randomizeAvatar();
  buildParade();

  if (_isInviteFlow) {
    document.querySelector('.avatar-customizer').style.display = 'none';
    document.getElementById('btn-private').style.display  = 'none';
    document.getElementById('join-section').style.display = 'none';

    const noticeCard = document.getElementById('invite-notice-card');
    const noticeCode = document.getElementById('invite-notice-code');
    noticeCard.style.display = '';
    noticeCode.textContent = _inviteCode;

    const playBtn = document.getElementById('btn-play');
    playBtn.textContent = 'Join Game!';
    playBtn.style.background = 'linear-gradient(135deg, #2979ff 0%, #1a5cd4 100%)';
  }
  </script>
</body>
</html>
